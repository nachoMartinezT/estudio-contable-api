spring.application.name=notification-service
server.port=8090

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/guida_contable}
spring.datasource.username=${DB_USER:guida_user}
spring.datasource.password=${DB_PASSWORD:password123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.hikari.initialization-fail-timeout=-1

resend.api-key=${RESEND_API_KEY:}
resend.from-email=noreply@guidapixel.com

internal-api-key=${INTERNAL_API_KEY:}
app.base-url=${APP_BASE_URL:http://localhost:5173}

services.ledger-service.url=${LEDGER_SERVICE_URL:http://localhost:8088}
services.auth-service.url=${AUTH_SERVICE_URL:http://localhost:8081}
