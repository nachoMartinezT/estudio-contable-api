spring.application.name=afip-service
server.port=8084

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/guida_contable}
spring.datasource.username=${DB_USER:guida_user}
spring.datasource.password=${DB_PASSWORD:password123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.hikari.initialization-fail-timeout=-1

# URLs AFIP (homologacion por defecto)
afip.wsaa.url=${AFIP_WSAA_URL:https://wsaahomo.afip.gov.ar/ws/services/LoginCms}
afip.wsfe.url=${AFIP_WSFE_URL:https://wswhomo.afip.gov.ar/wsfev1/service.asmx}

# Internal service URLs
services.auth-service.url=${AUTH_SERVICE_URL:http://auth-service:8081}
internal.api.key=${INTERNAL_API_KEY:defaultInternalKey}
