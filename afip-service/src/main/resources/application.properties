spring.application.name=afip-service
server.port=8084

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/guida_contable}
spring.datasource.username=${DB_USER:guida_user}
spring.datasource.password=${DB_PASSWORD:password123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.hikari.initialization-fail-timeout=-1

afip.cert.path=${AFIP_CERT_PATH:certs/certificado.p12}
afip.cert.password=${AFIP_CERT_PASSWORD}

# URLs AFIP (homologaci\u00f3n por defecto)
afip.wsaa.url=${AFIP_WSAA_URL:https://wsaahomo.afip.gov.ar/ws/services/LoginCms}
afip.wsfe.url=${AFIP_WSFE_URL:https://wswhomo.afip.gov.ar/wsfev1/service.asmx}

# Valores por defecto para emisi\u00f3n de facturas
afip.default.cuit-emisor=${AFIP_CUIT_EMISOR:20325847094}
afip.default.punto-venta=${AFIP_PUNTO_VENTA:1}
afip.default.tipo-comprobante=${AFIP_TIPO_COMPROBANTE:11}
