spring:
  application:
    name: api-gateway

  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      loadbalancer:
        enabled: false
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**,/api/v1/admin/**
        - id: client-service
          uri: http://client-service:8082
          predicates:
            - Path=/api/v1/clients/**
        - id: invoice-service
          uri: http://invoice-service:8083
          predicates:
            - Path=/api/v1/invoices/**
        - id: afip-service
          uri: http://afip-service:8084
          predicates:
            - Path=/api/afip/**
        - id: audit-service
          uri: http://audit-service:8085
          predicates:
            - Path=/api/v1/audit/**
        - id: dashboard-service
          uri: http://dashboard-service:8086
          predicates:
            - Path=/api/v1/dashboard/**
        - id: document-service
          uri: http://document-service:8087
          predicates:
            - Path=/api/v1/documents/**
        - id: ledger-service
          uri: http://ledger-service:8088
          predicates:
            - Path=/api/v1/ledger/**,/api/internal/ledger/**
        - id: mp-service
          uri: http://mp-service:8089
          predicates:
            - Path=/api/v1/mp/**,/api/internal/mp/**
        - id: notification-service
          uri: http://notification-service:8090
          predicates:
            - Path=/api/internal/notifications/**

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:ZGVmYXVsdFNlY3JldEtleUZvckRldmVsb3BtZW50UHVycG9zZXNPbmx5MTIzNDU2Nzg5MA==}

services:
  auth-service:
    url: http://auth-service:8081

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
