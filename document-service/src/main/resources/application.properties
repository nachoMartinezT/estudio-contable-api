spring.application.name=document-service
server.port=8087

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/guida_contable}
spring.datasource.username=${DB_USER:guida_user}
spring.datasource.password=${DB_PASSWORD:password123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.hikari.initialization-fail-timeout=-1

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.root-user=${MINIO_ROOT_USER:minioadmin}
minio.root-password=${MINIO_ROOT_PASSWORD:minioadmin123}
minio.bucket.documents=${MINIO_BUCKET_DOCUMENTS:guida-documentos}

services.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8090}
internal-api-key=${INTERNAL_API_KEY:}
app.base-url=${APP_BASE_URL:http://localhost:5173}
