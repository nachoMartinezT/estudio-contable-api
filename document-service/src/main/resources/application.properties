spring.application.name=document-service
server.port=8087

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/guida_contable}
spring.datasource.username=${DB_USER:guida_user}
spring.datasource.password=${DB_PASSWORD:password123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.hikari.initialization-fail-timeout=-1

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

document.storage.path=${DOCUMENT_STORAGE_PATH:/app/documents}
