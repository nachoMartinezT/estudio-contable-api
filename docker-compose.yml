services:

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: guida-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - client-service
      - invoice-service
      - afip-service
      - audit-service
      - dashboard-service
    environment:
      JAVA_OPTS: "-Xmx256m -Xms128m"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: guida-auth
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: guida_user
      DB_PASSWORD: password123
      JAVA_OPTS: "-Xmx256m -Xms128m"

  client-service:
    build:
      context: .
      dockerfile: client-service/Dockerfile
    container_name: guida-clients
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: guida_user
      DB_PASSWORD: password123
      JAVA_OPTS: "-Xmx256m -Xms128m"

  invoice-service:
    build:
      context: .
      dockerfile: invoice-service/Dockerfile
    container_name: guida-invoices
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: guida_user
      DB_PASSWORD: password123
      JAVA_OPTS: "-Xmx256m -Xms128m"

  afip-service:
    build:
      context: .
      dockerfile: afip-service/Dockerfile
    container_name: guida-afip
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: guida_user
      DB_PASSWORD: password123
      AFIP_CERT_PASSWORD: ${AFIP_CERT_PASSWORD}
      AFIP_CERT_PATH: /app/certs/certificado.p12
      JAVA_OPTS: "-Xmx256m -Xms128m"
    volumes:
      - /home/nachomartinezdev/certs:/app/certs:ro

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    container_name: guida-audit
    ports:
      - "8085:8085"
    depends_on:
      mongo:
        condition: service_started
    environment:
      AUDIT_MONGO_URI: mongodb://mongo:27017/guida_audit
      JAVA_OPTS: "-Xmx256m -Xms128m"

  dashboard-service:
    build:
      context: .
      dockerfile: dashboard-service/Dockerfile
    container_name: guida-dashboard
    ports:
      - "8086:8086"
    depends_on:
      - client-service
      - invoice-service
      - audit-service
    environment:
      SERVICES_CLIENT_SERVICE_URL: http://client-service:8082
      SERVICES_INVOICE_SERVICE_URL: http://invoice-service:8083
      SERVICES_AUDIT_SERVICE_URL: http://audit-service:8085
      JAVA_OPTS: "-Xmx256m -Xms128m"

  postgres:
    container_name: guida-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guida_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: guida_contable
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    container_name: guida-mongo
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
