services:

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: guida-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - client-service
      - invoice-service
      - afip-service
      - audit-service
      - dashboard-service
      - ledger-service
      - mp-service
      - notification-service
    environment:
      JAVA_OPTS: "-Xmx256m -Xms128m"
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_AUTH_SERVICE_URL: http://auth-service:8081
    networks:
      - guida-internal

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: guida-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AFIP_CERT_STORAGE_PATH: /app/certs
      AFIP_ENCRYPTION_KEY: ${AFIP_ENCRYPTION_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    volumes:
      - afip_certs:/app/certs
    networks:
      - guida-internal

  client-service:
    build:
      context: .
      dockerfile: client-service/Dockerfile
    container_name: guida-clients
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  invoice-service:
    build:
      context: .
      dockerfile: invoice-service/Dockerfile
    container_name: guida-invoices
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AFIP_SERVICE_URL: http://afip-service:8084
      AUTH_SERVICE_URL: http://auth-service:8081
      LEDGER_SERVICE_URL: http://ledger-service:8088
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  afip-service:
    build:
      context: .
      dockerfile: afip-service/Dockerfile
    container_name: guida-afip
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    volumes:
      - afip_certs:/app/certs:ro
    networks:
      - guida-internal

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    container_name: guida-audit
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      AUDIT_MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/guida_audit
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  dashboard-service:
    build:
      context: .
      dockerfile: dashboard-service/Dockerfile
    container_name: guida-dashboard
    restart: unless-stopped
    depends_on:
      - client-service
      - invoice-service
      - audit-service
    environment:
      SERVICES_CLIENT_SERVICE_URL: http://client-service:8082
      SERVICES_INVOICE_SERVICE_URL: http://invoice-service:8083
      SERVICES_AUDIT_SERVICE_URL: http://audit-service:8085
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  document-service:
    build:
      context: .
      dockerfile: document-service/Dockerfile
    container_name: guida-documents
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:guida-documentos}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  ledger-service:
    build:
      context: .
      dockerfile: ledger-service/Dockerfile
    container_name: guida-ledger
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MP_SERVICE_URL: http://mp-service:8089
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  report-service:
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: guida-reports
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  mp-service:
    build:
      context: .
      dockerfile: mp-service/Dockerfile
    container_name: guida-mp
    restart: unless-stopped
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      LEDGER_SERVICE_URL: http://ledger-service:8088
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: guida-notifications
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      RESEND_API_KEY: ${RESEND_API_KEY}
      LEDGER_SERVICE_URL: http://ledger-service:8088
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      APP_BASE_URL: ${APP_BASE_URL:http://localhost:5173}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  report-service:
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: guida-reports
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/guida_contable
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    networks:
      - guida-internal

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - guida-internal

  postgres:
    container_name: guida-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: guida_contable
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d guida_contable"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - guida-internal

  mongo:
    container_name: guida-mongo
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - guida-internal

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  afip_certs:

networks:
  guida-internal:
    driver: bridge
