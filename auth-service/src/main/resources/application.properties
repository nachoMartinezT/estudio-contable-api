spring.application.name=auth-service
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/guida_contable}
spring.datasource.username=${DB_USER:guida_user}
spring.datasource.password=${DB_PASSWORD:password123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.hikari.initialization-fail-timeout=-1

# AFIP cert storage
afip.cert.storage.path=${AFIP_CERT_STORAGE_PATH:/app/certs}
afip.encryption.key=${AFIP_ENCRYPTION_KEY:GuidaContable2026SecureKey!}

# Internal API key for service-to-service communication
internal.api.key=${INTERNAL_API_KEY:defaultInternalKey}

services.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8090}
app.base-url=${APP_BASE_URL:http://localhost:5173}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
