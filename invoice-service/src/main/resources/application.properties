spring.application.name=invoice-service
server.port=8083

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/guida_contable}
spring.datasource.username=${DB_USER:guida_user}
spring.datasource.password=${DB_PASSWORD:password123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.hikari.initialization-fail-timeout=-1

# URLs de servicios internos
services.afip-service.url=${AFIP_SERVICE_URL:http://afip-service:8084}
services.auth-service.url=${AUTH_SERVICE_URL:http://auth-service:8081}
services.ledger-service.url=${LEDGER_SERVICE_URL:http://ledger-service:8088}

# Internal API key for service-to-service communication
internal.api.key=${INTERNAL_API_KEY:defaultInternalKey}
